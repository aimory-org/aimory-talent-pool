# ─────────────────────────────────────────────────────────────────────────────
# Frontend Tests — runs on every pull request targeting main.
# Runs ESLint, TypeScript check, and Vitest tests with coverage.
# ─────────────────────────────────────────────────────────────────────────────

name: Frontend Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/web/**"
      - ".github/workflows/pr-frontend-tests.yml"

permissions:
  contents: write   # needed to push auto-fix commits back to the PR branch
  pull-requests: write

concurrency:
  group: frontend-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Informational only — newly-published advisories can flip this red with no
      # code change, so it must not block unrelated PRs. Dependabot security
      # updates are the mechanism that actually drives fixes. Review the output
      # and address highs via a dedicated PR.
      - name: npm audit (dependency CVEs)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Auto-fix with ESLint
        run: |
          npx eslint . --fix || true
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: eslint --fix [skip ci]"
            git push
          fi

      - name: ESLint
        run: npx eslint .

      - name: TypeScript check (app)
        run: npx tsc --noEmit

      - name: TypeScript check (tests)
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: frontend/web/coverage/
          retention-days: 7
