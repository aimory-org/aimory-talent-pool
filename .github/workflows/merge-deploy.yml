# ─────────────────────────────────────────────────────────────────────────────
# Deploy — runs on every push (merge) to main.
# 1. Builds Lambda layer
# 2. terraform plan → apply
# 3. Rebuilds & deploys the frontend to S3/CloudFront
#
# Approval gate: configure "Required reviewers" on the GitHub Environment
# named "dev" (Settings → Environments → dev → Protection rules).
# If no reviewers are configured the deploy runs automatically on merge.
#
# Required GitHub Secrets (repository or environment "dev"):
#   AWS_ACCESS_KEY_ID          – IAM access key with deploy permissions
#   AWS_SECRET_ACCESS_KEY      – IAM secret key
#   TF_VAR_PRESIGN_API_KEY     – presign Lambda API key (min 16 chars)
#   TF_VAR_ENTRA_CLIENT_ID     – Microsoft Entra ID application client ID
#   TF_VAR_ENTRA_CLIENT_SECRET – Microsoft Entra ID client secret
#   TF_VAR_ENTRA_TENANT_ID     – Microsoft Entra ID tenant ID
#   DEPLOYMENTS_PAT            – GitHub token used by /deployments API (stored in SSM)
#
# Required GitHub Variables (repository or environment "dev"):
#   TF_VAR_COGNITO_CALLBACK_URLS – JSON list, e.g. '["http://localhost:5173","https://xxxxx.cloudfront.net"]'
#   TF_VAR_COGNITO_LOGOUT_URLS   – JSON list, same format
#
# Optional GitHub Variables:
#   VITE_ALLOWED_EMAIL_SUFFIXES – comma-separated email suffixes (e.g. "@contoso.com")
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

# Prevent concurrent deploys — queue rather than cancel
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  TF_DIR: infra/envs/dev
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true
  GITHUB_PAT_PARAM: /aimory/github-pat

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Terraform Plan & Apply
  # ═══════════════════════════════════════════════════════════════════════════
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      distribution_id: ${{ steps.outputs.outputs.distribution_id }}
      distribution_domain: ${{ steps.outputs.outputs.distribution_domain }}
      cognito_user_pool_id: ${{ steps.outputs.outputs.cognito_user_pool_id }}
      cognito_web_client_id: ${{ steps.outputs.outputs.cognito_web_client_id }}
      cognito_domain: ${{ steps.outputs.outputs.cognito_domain }}
      api_endpoint: ${{ steps.outputs.outputs.api_endpoint }}
      presign_function_url: ${{ steps.outputs.outputs.presign_function_url }}
      resume_bucket: ${{ steps.outputs.outputs.resume_bucket }}
      raw_prefix: ${{ steps.outputs.outputs.raw_prefix }}
      project_name: ${{ steps.outputs.outputs.project_name }}
      environment_name: ${{ steps.outputs.outputs.environment_name }}
      pipeline_state_machine_arn: ${{ steps.outputs.outputs.pipeline_state_machine_arn }}
      talent_profiles_table: ${{ steps.outputs.outputs.talent_profiles_table }}
      audit_log_table: ${{ steps.outputs.outputs.audit_log_table }}
      skills_lookup_table: ${{ steps.outputs.outputs.skills_lookup_table }}
      certifications_lookup_table: ${{ steps.outputs.outputs.certifications_lookup_table }}
      cities_lookup_table: ${{ steps.outputs.outputs.cities_lookup_table }}
      job_titles_lookup_table: ${{ steps.outputs.outputs.job_titles_lookup_table }}
      industry_categories_lookup_table: ${{ steps.outputs.outputs.industry_categories_lookup_table }}
      job_descriptions_table: ${{ steps.outputs.outputs.job_descriptions_table }}
      jd_pipeline_state_machine_arn: ${{ steps.outputs.outputs.jd_pipeline_state_machine_arn }}

    env:
      TF_VAR_presign_api_key: ${{ secrets.TF_VAR_PRESIGN_API_KEY }}
      TF_VAR_entra_client_id: ${{ secrets.TF_VAR_ENTRA_CLIENT_ID }}
      TF_VAR_entra_client_secret: ${{ secrets.TF_VAR_ENTRA_CLIENT_SECRET }}
      TF_VAR_entra_tenant_id: ${{ secrets.TF_VAR_ENTRA_TENANT_ID }}
      TF_VAR_cognito_callback_urls: ${{ vars.TF_VAR_COGNITO_CALLBACK_URLS }}
      TF_VAR_cognito_logout_urls: ${{ vars.TF_VAR_COGNITO_LOGOUT_URLS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate deployments token secret
        run: |
          if [ -z "${{ secrets.DEPLOYMENTS_PAT }}" ]; then
            echo "::error::Missing required GitHub secret: DEPLOYMENTS_PAT"
            exit 1
          fi

      - name: Sync deployments token to SSM
        run: |
          aws ssm put-parameter \
            --name "${{ env.GITHUB_PAT_PARAM }}" \
            --type SecureString \
            --value "${{ secrets.DEPLOYMENTS_PAT }}" \
            --overwrite \
            --description "GitHub token for deployment history API"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # clean output for terraform output -raw

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Build Lambda layers + staging dirs ────────────────────────────────
      - name: Build Lambda artefacts
        run: bash infra/build.sh --no-docker

      # ── Terraform ─────────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_DIR }}

      # ── Backup current state before apply ─────────────────────────────────
      - name: Backup Terraform State
        id: backup
        working-directory: ${{ env.TF_DIR }}
        run: |
          # Download current state for potential rollback
          terraform state pull > state-backup-${{ github.sha }}.json
          if [ -s state-backup-${{ github.sha }}.json ]; then
            echo "state_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "state_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload State Backup
        if: steps.backup.outputs.state_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-backup-${{ github.sha }}
          path: ${{ env.TF_DIR }}/state-backup-${{ github.sha }}.json
          retention-days: 30

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.log
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exitcode=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          
          # Exit codes: 0=no changes, 1=error, 2=changes present
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi

      - name: Terraform Apply
        id: apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          terraform apply -input=false -no-color tfplan 2>&1 | tee apply.log
          APPLY_EXIT=${PIPESTATUS[0]}
          echo "exitcode=$APPLY_EXIT" >> "$GITHUB_OUTPUT"
          
          if [ $APPLY_EXIT -ne 0 ]; then
            echo "::error::Terraform apply failed. State backup available in artifacts."
            echo "::error::To rollback: download state-backup artifact and run 'terraform state push <file>'"
            exit 1
          fi

      # ── Capture outputs for the frontend job ──────────────────────────────
      - name: Capture Terraform Outputs
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_site_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw frontend_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$(terraform output -raw frontend_distribution_domain)" >> "$GITHUB_OUTPUT"
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_web_client_id=$(terraform output -raw cognito_web_client_id)" >> "$GITHUB_OUTPUT"

          # Strip https:// prefix if present so VITE_COGNITO_DOMAIN is just the hostname
          RAW_DOMAIN=$(terraform output -raw cognito_domain_url)
          echo "cognito_domain=${RAW_DOMAIN#https://}" >> "$GITHUB_OUTPUT"

          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "presign_function_url=$(terraform output -raw presign_function_url)" >> "$GITHUB_OUTPUT"
          echo "resume_bucket=$(terraform output -raw resume_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "raw_prefix=$(terraform output -raw raw_prefix)" >> "$GITHUB_OUTPUT"
          echo "project_name=$(terraform output -raw project_name)" >> "$GITHUB_OUTPUT"
          echo "environment_name=$(terraform output -raw environment)" >> "$GITHUB_OUTPUT"
          echo "pipeline_state_machine_arn=$(terraform output -raw pipeline_state_machine_arn)" >> "$GITHUB_OUTPUT"
          echo "talent_profiles_table=$(terraform output -raw talent_profiles_table_name)" >> "$GITHUB_OUTPUT"
          echo "audit_log_table=$(terraform output -raw audit_log_table_name)" >> "$GITHUB_OUTPUT"
          echo "skills_lookup_table=$(terraform output -raw skills_lookup_table_name)" >> "$GITHUB_OUTPUT"
          echo "certifications_lookup_table=$(terraform output -raw certifications_lookup_table_name)" >> "$GITHUB_OUTPUT"
          echo "cities_lookup_table=$(terraform output -raw cities_lookup_table_name)" >> "$GITHUB_OUTPUT"
          echo "job_titles_lookup_table=$(terraform output -raw job_titles_lookup_table_name)" >> "$GITHUB_OUTPUT"
          echo "industry_categories_lookup_table=$(terraform output -raw industry_categories_lookup_table_name)" >> "$GITHUB_OUTPUT"
          echo "job_descriptions_table=$(terraform output -raw job_descriptions_table_name)" >> "$GITHUB_OUTPUT"
          echo "jd_pipeline_state_machine_arn=$(terraform output -raw jd_pipeline_state_machine_arn)" >> "$GITHUB_OUTPUT"

      # ── Upload logs for auditing ──────────────────────────────────────────
      - name: Upload Terraform Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-logs-${{ github.sha }}
          path: |
            ${{ env.TF_DIR }}/plan.log
            ${{ env.TF_DIR }}/apply.log
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # Frontend Build & Deploy
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    name: Deploy Frontend
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Generate .env from Terraform outputs
        working-directory: frontend/web
        run: |
          cat > .env <<ENVEOF
          VITE_COGNITO_USER_POOL_ID=${{ needs.terraform.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID=${{ needs.terraform.outputs.cognito_web_client_id }}
          VITE_COGNITO_DOMAIN=${{ needs.terraform.outputs.cognito_domain }}
          VITE_AWS_REGION=us-east-1
          VITE_COGNITO_REDIRECT_URI=https://${{ needs.terraform.outputs.distribution_domain }}
          VITE_API_ENDPOINT=${{ needs.terraform.outputs.api_endpoint }}
          VITE_ALLOWED_EMAIL_SUFFIXES=${{ vars.VITE_ALLOWED_EMAIL_SUFFIXES }}
          ENVEOF

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Build
        working-directory: frontend/web
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/web/dist \
            "s3://${{ needs.terraform.outputs.frontend_bucket }}" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.terraform.outputs.distribution_id }}" \
            --paths "/index.html"

  # ═══════════════════════════════════════════════════════════════════════════
  # Notify on failure (extend with Slack/Teams webhook as needed)
  # ═══════════════════════════════════════════════════════════════════════════
  notify-failure:
    name: Failure Notification
    if: failure()
    needs: [terraform, frontend, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Report failure
        run: |
          echo "::error::Deploy workflow failed for commit ${{ github.sha }}."
          echo ""
          echo "Troubleshooting:"
          echo "  • Check the Terraform logs artifact for detailed output."
          echo "  • If state is locked, run: terraform force-unlock <LOCK_ID>"
          echo "  • Re-run the workflow from the Actions tab after fixing."
          echo ""
          echo "To add Slack/Teams alerts, add a webhook step to the notify-failure job."

  # ═══════════════════════════════════════════════════════════════════════════
  # Post-Deployment Smoke Tests
  # Runs against the live deployed environment after terraform + frontend.
  # Uses real AWS credentials — no mocking.
  # ═══════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Post-Deployment Smoke Tests
    needs: [terraform, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt requests

      - name: Run post-deployment smoke tests
        run: |
          pytest infra/tests/integration/ -m integration -v --tb=short
        env:
          API_ENDPOINT: ${{ needs.terraform.outputs.api_endpoint }}
          PRESIGN_FUNCTION_URL: ${{ needs.terraform.outputs.presign_function_url }}
          PRESIGN_API_KEY: ${{ secrets.TF_VAR_PRESIGN_API_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          PROJECT_NAME: ${{ needs.terraform.outputs.project_name }}
          ENVIRONMENT: ${{ needs.terraform.outputs.environment_name }}
          RESUME_BUCKET: ${{ needs.terraform.outputs.resume_bucket }}
          RAW_PREFIX: ${{ needs.terraform.outputs.raw_prefix }}
          PIPELINE_STATE_MACHINE_ARN: ${{ needs.terraform.outputs.pipeline_state_machine_arn }}
          TALENT_PROFILES_TABLE: ${{ needs.terraform.outputs.talent_profiles_table }}
          AUDIT_LOG_TABLE: ${{ needs.terraform.outputs.audit_log_table }}
          SKILLS_LOOKUP_TABLE: ${{ needs.terraform.outputs.skills_lookup_table }}
          CERTIFICATIONS_LOOKUP_TABLE: ${{ needs.terraform.outputs.certifications_lookup_table }}
          CITIES_LOOKUP_TABLE: ${{ needs.terraform.outputs.cities_lookup_table }}
          JOB_TITLES_LOOKUP_TABLE: ${{ needs.terraform.outputs.job_titles_lookup_table }}
          INDUSTRY_CATEGORIES_LOOKUP_TABLE: ${{ needs.terraform.outputs.industry_categories_lookup_table }}
          JOB_DESCRIPTIONS_TABLE: ${{ needs.terraform.outputs.job_descriptions_table }}
          JD_PIPELINE_STATE_MACHINE_ARN: ${{ needs.terraform.outputs.jd_pipeline_state_machine_arn }}
          REQUIRE_GITHUB_DEPLOYMENTS_SUCCESS: "1"
          RUN_TEXTRACT_INTEGRATION: "0"
          RUN_BEDROCK_LAMBDA_TEST: "0"
          RUN_FULL_PIPELINE_E2E: "1"
          RUN_FULL_PIPELINE_NON_RESUME_E2E: "1"
          RUN_STALE_CHECKER_INTEGRATION: "0"

  # ═══════════════════════════════════════════════════════════════════════════
  # Automatic Rollback
  #
  # Triggered only when smoke-test fails. Strategy:
  #   1. Attempt to release any stale Terraform state lock (safe no-op if not locked)
  #   2. Resolve rollback target SHA:
  #      - Prefer last successful merge-deploy run on main
  #      - Fallback to github.event.before
  #   3. Re-apply Terraform + redeploy frontend from that known-good commit
  #
  # This avoids creating a revert commit, so git history stays clean and
  # feature branches do not get forced "behind" by rollback-only commits.
  #
  # Requirements:
  #   • GitHub Environment "dev" must exist (used by the terraform job above).
  #   • actions:read permission is required to query prior workflow runs.
  # ═══════════════════════════════════════════════════════════════════════════
  rollback:
    name: Auto Rollback (No Revert Commit)
    needs: [smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    environment: dev

    env:
      TF_VAR_presign_api_key: ${{ secrets.TF_VAR_PRESIGN_API_KEY }}
      TF_VAR_entra_client_id: ${{ secrets.TF_VAR_ENTRA_CLIENT_ID }}
      TF_VAR_entra_client_secret: ${{ secrets.TF_VAR_ENTRA_CLIENT_SECRET }}
      TF_VAR_entra_tenant_id: ${{ secrets.TF_VAR_ENTRA_TENANT_ID }}
      TF_VAR_cognito_callback_urls: ${{ vars.TF_VAR_COGNITO_CALLBACK_URLS }}
      TF_VAR_cognito_logout_urls: ${{ vars.TF_VAR_COGNITO_LOGOUT_URLS }}

    steps:
      - name: Resolve rollback target SHA
        id: rollback_target
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          FALLBACK_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          candidate_sha=""
          api_url="https://api.github.com/repos/${REPO}/actions/workflows/merge-deploy.yml/runs?branch=main&status=completed&per_page=50"
          response_file="$(mktemp)"

          if curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}" \
            -o "${response_file}" 2>/dev/null; then
            candidate_sha="$(python3 -c 'import json, sys; current = int(sys.argv[1]); data = json.load(open(sys.argv[2], encoding="utf-8")); print(next(((run.get("head_sha") or "").strip() for run in data.get("workflow_runs", []) if run.get("conclusion") == "success" and run.get("event") == "push" and run.get("head_branch") == "main" and int(run.get("id") or 0) < current and (run.get("head_sha") or "").strip()), ""))' "${CURRENT_RUN_ID}" "${response_file}")"
          else
            echo "::warning::Unable to query previous successful workflow runs; using fallback SHA logic."
          fi

          rm -f "${response_file}"

          if [ -n "${candidate_sha}" ]; then
            target_sha="${candidate_sha}"
            source="last-successful-deploy-run"
          elif [ -n "${FALLBACK_SHA}" ] && [ "${FALLBACK_SHA}" != "0000000000000000000000000000000000000000" ]; then
            target_sha="${FALLBACK_SHA}"
            source="github.event.before"
          else
            echo "::error::Could not determine rollback target SHA from workflow history or github.event.before"
            exit 1
          fi

          echo "sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "::notice::Rollback target SHA: ${target_sha} (source: ${source})"

      - name: Checkout last known good commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.rollback_target.outputs.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Build Lambda layers
        run: |
          find infra/modules -type f -name requirements.txt -path "*/layers/*" | while read req; do
            layer_dir=$(dirname "$req")
            echo "Building layer: $layer_dir"
            pip install --quiet -r "$req" -t "$layer_dir/python"
          done

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_DIR }}

      # ── Release stale lock (if any) ────────────────────────────────────────
      # If a previous run crashed mid-apply it may have left the state locked.
      # We extract the lock ID from `terraform plan` output and force-unlock it
      # so the subsequent rollback apply can proceed.
      - name: Release stale Terraform state lock
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          PLAN_OUTPUT=$(terraform plan -input=false -no-color 2>&1)
          PLAN_EXIT=$?
          echo "$PLAN_OUTPUT"

          if echo "$PLAN_OUTPUT" | grep -q "Error acquiring the state lock"; then
            # Extract the lock ID from the error message
            LOCK_ID=$(echo "$PLAN_OUTPUT" | grep -oP '(?<=ID:\s{8})[a-f0-9-]{36}' | head -1)
            if [ -n "$LOCK_ID" ]; then
              echo "::warning::Stale lock detected (ID: $LOCK_ID). Force-unlocking..."
              terraform force-unlock -force "$LOCK_ID"
            else
              echo "::error::State is locked but could not extract lock ID. Manual intervention required."
              echo "Run: cd ${{ env.TF_DIR }} && terraform force-unlock <LOCK_ID>"
              exit 1
            fi
          elif [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed for a reason other than state lock."
            exit 1
          fi
          echo "State is not locked — proceeding with rollback."

      - name: Terraform Plan (rollback target)
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform Apply (rollback target)
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -no-color tfplan

      - name: Capture rollback Terraform outputs
        id: rollback_outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_site_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw frontend_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "distribution_domain=$(terraform output -raw frontend_distribution_domain)" >> "$GITHUB_OUTPUT"
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_web_client_id=$(terraform output -raw cognito_web_client_id)" >> "$GITHUB_OUTPUT"
          RAW_DOMAIN=$(terraform output -raw cognito_domain_url)
          echo "cognito_domain=${RAW_DOMAIN#https://}" >> "$GITHUB_OUTPUT"
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> "$GITHUB_OUTPUT"

      - name: Generate frontend .env from rollback outputs
        working-directory: frontend/web
        run: |
          cat > .env <<ENVEOF
          VITE_COGNITO_USER_POOL_ID=${{ steps.rollback_outputs.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID=${{ steps.rollback_outputs.outputs.cognito_web_client_id }}
          VITE_COGNITO_DOMAIN=${{ steps.rollback_outputs.outputs.cognito_domain }}
          VITE_AWS_REGION=us-east-1
          VITE_COGNITO_REDIRECT_URI=https://${{ steps.rollback_outputs.outputs.distribution_domain }}
          VITE_API_ENDPOINT=${{ steps.rollback_outputs.outputs.api_endpoint }}
          VITE_ALLOWED_EMAIL_SUFFIXES=${{ vars.VITE_ALLOWED_EMAIL_SUFFIXES }}
          ENVEOF

      - name: Install frontend dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Build frontend (rollback target)
        working-directory: frontend/web
        run: npm run build

      - name: Deploy rollback frontend to S3
        run: |
          aws s3 sync frontend/web/dist \
            "s3://${{ steps.rollback_outputs.outputs.frontend_bucket }}" \
            --delete

      - name: Invalidate CloudFront cache after rollback
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.rollback_outputs.outputs.distribution_id }}" \
            --paths "/index.html"

      - name: Report rollback completion
        run: |
          echo "::notice::Rollback completed by redeploying commit ${{ steps.rollback_target.outputs.sha }}."
          echo "::notice::Rollback target source: ${{ steps.rollback_target.outputs.source }}."
          echo "::notice::No git revert commit was created on main."
