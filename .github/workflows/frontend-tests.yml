# ─────────────────────────────────────────────────────────────────────────────
# Frontend Tests — runs on every pull request targeting main.
# Runs ESLint, TypeScript check, and Vitest tests with coverage.
# ─────────────────────────────────────────────────────────────────────────────

name: Frontend Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/web/**"
      - ".github/workflows/frontend-tests.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: frontend-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: TypeScript check (app)
        run: npx tsc --noEmit

      - name: TypeScript check (tests)
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/web/coverage/
          retention-days: 7
