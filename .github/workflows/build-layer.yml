name: Build Lambda Layer

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-layer.yml"
      - "infra/modules/lambdas/layers/pdfminer/**"
  pull_request:
    paths:
      - ".github/workflows/build-layer.yml"
      - "infra/modules/lambdas/layers/pdfminer/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pdfminer layer
        run: ./infra/modules/lambdas/layers/pdfminer/build_layer.sh python3
