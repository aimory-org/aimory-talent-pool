# ─────────────────────────────────────────────────────────────────────────────
# Secret Scanning — runs on every pull request targeting main.
# Uses Gitleaks to detect hardcoded secrets, API keys, tokens, and credentials
# committed to the repository.
#
# Fails the PR if any secrets are found — no soft-fail. Secrets in source
# code must be removed and the commit history cleaned before merge.
#
# To suppress a false positive, add a `# gitleaks:allow` inline comment.
# ─────────────────────────────────────────────────────────────────────────────

name: Secret Scanning

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # needed to post findings as PR comments

concurrency:
  group: secret-scanning-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits in the PR

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name | ltrimstr("v")')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --redact
