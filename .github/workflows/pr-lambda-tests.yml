# ─────────────────────────────────────────────────────────────────────────────
# Lambda Unit Tests — runs on every pull request targeting main.
# No AWS credentials required — all AWS calls are mocked with moto.
#
# Tests live in infra/tests/unit/ (pre-deployment, fully mocked).
# Post-deployment smoke tests in infra/tests/integration/ run separately
# after a successful merge to main (see terraform-deploy.yml).
#
# Gates PR merges: tests must pass before merge is allowed.
# Coverage report uploaded as a PR artifact.
# ─────────────────────────────────────────────────────────────────────────────

name: Lambda Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write        # needed to push auto-fix commits back to the PR branch
  pull-requests: write

concurrency:
  group: lambda-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── Auto-fix & commit ──────────────────────────────────────────────────
      # ruff check --fix handles imports, unused vars, whitespace, etc.
      # ruff format handles formatting (Black-compatible).
      # If either changes anything, commit & push back to the PR branch so the
      # author doesn't have to fix style issues manually.
      - name: Auto-fix with ruff
        id: autofix
        run: |
          ruff check --fix infra/modules infra/tests
          ruff format infra/modules infra/tests
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-fix ruff [skip ci]"
            git push
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Code quality (fail if anything remains after auto-fix) ────────────
      - name: Ruff lint
        run: ruff check infra/modules infra/tests --output-format=github

      - name: Ruff format check
        run: ruff format --check infra/modules infra/tests

      # ── Type checking ──────────────────────────────────────────────────────
      - name: mypy
        run: |
          mypy \
            --explicit-package-bases \
            infra/modules/api/lambda_src \
            infra/modules/document_pipeline/lambda_src \
            infra/modules/jobs/lambda_src \
            infra/modules/storage/lambda_src \
            infra/pipeline_configs

      # ── Security scanning ──────────────────────────────────────────────────
      - name: Bandit SAST
        id: bandit
        if: always()  # run even if mypy fails
        run: |
          bandit -r \
            infra/modules/api/lambda_src \
            infra/modules/document_pipeline/lambda_src \
            infra/modules/jobs/lambda_src \
            infra/modules/storage/lambda_src \
            infra/pipeline_configs \
            --severity-level medium \
            --confidence-level medium \
            --format screen
        continue-on-error: true  # re-fail explicitly below so we always see output first

      - name: Fail if Bandit found issues
        if: always() && steps.bandit.outcome == 'failure'
        run: |
          echo "::error::Bandit found security issues. Review the output above."
          exit 1

      # Informational only — newly-published advisories can flip this red with no
      # code change, so it must not block unrelated PRs. Dependabot security
      # updates are the mechanism that actually drives fixes. Review the output
      # and address findings via a dedicated PR.
      - name: pip-audit (dependency CVEs)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail

          requirement_files=("requirements-dev.txt")
          while IFS= read -r file; do
            requirement_files+=("$file")
          done < <(find infra/modules -type f -path '*/layers/*/requirements.txt' | sort)

          echo "Auditing requirement files:"
          printf ' - %s\n' "${requirement_files[@]}"

          for file in "${requirement_files[@]}"; do
            pip-audit -r "$file" --progress-spinner off
          done

      # ── Unit tests ─────────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pytest infra/tests/unit/ \
            --cov=infra/modules \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v
        env:
          # Dummy values — moto intercepts all AWS calls
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: coverage.xml
          retention-days: 30

      - name: Post coverage summary to PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let summary = 'Coverage report not available.';
            try {
              const xml = fs.readFileSync('coverage.xml', 'utf8');
              const match = xml.match(/line-rate="([\d.]+)"/);
              if (match) {
                const pct = (parseFloat(match[1]) * 100).toFixed(1);
                summary = `**Line coverage: ${pct}%**`;
              }
            } catch {}

            const body = [
              '### Lambda Test Results — PR #${{ github.event.pull_request.number }}',
              '',
              summary,
              '',
              `*Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('### Lambda Test Results')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
